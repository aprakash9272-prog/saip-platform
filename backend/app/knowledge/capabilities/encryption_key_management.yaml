- name: Key Management System (KMS)
  code: ENC-001
  domain: Encryption & Key Management
  description: Centrally manages the lifecycle of cryptographic keys.
  risk_category: Critical
- name: Hardware Security Module (HSM)
  code: ENC-002
  domain: Encryption & Key Management
  description: Provides tamper-resistant hardware for key storage and cryptographic
    operations.
  risk_category: High
- name: Public Key Infrastructure (PKI)
  code: ENC-003
  domain: Encryption & Key Management
  description: Issues and manages digital certificates for authentication and encryption.
  risk_category: Critical
- name: Certificate Lifecycle Management
  code: ENC-004
  domain: Encryption & Key Management
  description: Tracks issuance, renewal, and revocation of digital certificates.
  risk_category: High
- name: Data-at-Rest Encryption Management
  code: ENC-005
  domain: Encryption & Key Management
  description: Manages encryption policy and keys for stored data.
  risk_category: Critical
- name: Data-in-Transit Encryption (TLS Management)
  code: ENC-006
  domain: Encryption & Key Management
  description: Manages TLS configuration and certificates for encrypted transport.
  risk_category: High
- name: Encryption Key Rotation
  code: ENC-007
  domain: Encryption & Key Management
  description: Automates periodic rotation of cryptographic keys.
  risk_category: Medium
- name: Bring Your Own Key (BYOK) / Hold Your Own Key (HYOK)
  code: ENC-008
  domain: Encryption & Key Management
  description: Allows customers to supply or retain control of encryption keys.
  risk_category: Medium
- name: Quantum-Resistant Cryptography Readiness
  code: ENC-009
  domain: Encryption & Key Management
  description: Assesses and prepares for migration to post-quantum cryptography.
  risk_category: Medium
- name: Code Signing Certificate Management
  code: ENC-010
  domain: Encryption & Key Management
  description: Manages certificates used to sign and verify software artifacts.
  risk_category: Medium
